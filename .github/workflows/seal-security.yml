name: Seal Security Remediation

on:
  workflow_dispatch:
    inputs:
      fix_mode:
        description: 'Fix mode: remote (UI-approved), local (actions file), or all (everything available)'
        required: true
        default: 'remote'
        type: choice
        options:
          - remote
          - local
          - all

jobs:
  remediate-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Download Dependencies
        run: mvn dependency:resolve -B

      - name: Seal Security - Fix Vulnerabilities
        uses: seal-community/cli-action@latest
        with:
          mode: fix
          fix_mode: ${{ github.event.inputs.fix_mode || 'remote' }}
          target: pom.xml
          token: ${{ secrets.SEAL_TOKEN }}
        env:
          SEAL_SNYK_URL: "https://api.snyk.io"
          SEAL_SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SEAL_SNYK_ORG_ID: "bf279eb4-3b32-4731-ba49-ea7588371789"
          SEAL_SNYK_PROJECT_ID: "5193ce84-979c-4dba-9efc-74ff35dd920f"

      - name: print dependency tree
        run: mvn dependency:tree
        
      - name: Generate and submit dependency graph
        uses: advanced-security/maven-dependency-submission-action@v4
      - name: Upload .seal-m2 as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sealed-m2
          path: /home/runner/work/WebGoat/WebGoat/.seal-m2/com/thoughtworks/xstream/xstream/1.4.5/xstream-1.4.5.jar
          if-no-files-found: error
          retention-days: 1
          


